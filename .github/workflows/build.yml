name: build

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    workflow_dispatch:

jobs:
    build-macos:
        runs-on: macos-26

        steps:
            - name: Set up Swift
              uses: swift-actions/setup-swift@v3
              with:
                swift-version: "6.3.2"

            - name: Checkout
              uses: actions/checkout@v4

            - name: Build
              run: swift build

            - name: Run tests
              run: swift test
